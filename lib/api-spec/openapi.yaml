openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gluco Guardian API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: glucose
    description: Glucose readings and anomaly detection
  - name: insulin
    description: Insulin calculations
  - name: food
    description: Food carb estimation
  - name: doctor
    description: Doctor portal — patient data sync and messaging
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /glucose:
    post:
      operationId: submitGlucoseReading
      tags: [glucose]
      summary: Submit a glucose reading
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GlucoseReadingRequest"
      responses:
        "200":
          description: Glucose reading processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlucoseReadingResponse"

  /glucose/history:
    get:
      operationId: getGlucoseHistory
      tags: [glucose]
      summary: Get glucose reading history
      responses:
        "200":
          description: Glucose history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlucoseHistoryResponse"
    delete:
      operationId: clearGlucoseHistory
      tags: [glucose]
      summary: Clear glucose history
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /insulin:
    post:
      operationId: calculateInsulin
      tags: [insulin]
      summary: Calculate insulin dose
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsulinRequest"
      responses:
        "200":
          description: Insulin calculation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsulinResponse"

  /food/estimate:
    post:
      operationId: estimateFoodCarbs
      tags: [food]
      summary: Estimate carbs for a food item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FoodEstimateRequest"
      responses:
        "200":
          description: Carb estimation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FoodEstimateResponse"

  /doctor/login:
    post:
      operationId: doctorLogin
      tags: [doctor]
      summary: Doctor login with access code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DoctorLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorLoginResponse"
        "401":
          description: Invalid access code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /doctor/sync:
    post:
      operationId: syncPatientData
      tags: [doctor]
      summary: Mobile app syncs patient snapshot to server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientSnapshot"
      responses:
        "200":
          description: Sync successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /doctor/patient/{accessCode}:
    get:
      operationId: getPatientData
      tags: [doctor]
      summary: Get patient data for a doctor access code
      parameters:
        - in: path
          name: accessCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Patient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatientSnapshot"
        "404":
          description: No patient data found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /doctor/messages/{accessCode}:
    get:
      operationId: getDoctorMessages
      tags: [doctor]
      summary: Get messages for a patient
      parameters:
        - in: path
          name: accessCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMessagesResponse"
    post:
      operationId: sendDoctorMessage
      tags: [doctor]
      summary: Doctor sends a message to patient
      parameters:
        - in: path
          name: accessCode
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorMessage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GlucoseReadingRequest:
      type: object
      properties:
        glucose:
          type: number
          description: Glucose value in mg/dL
      required:
        - glucose

    AnomalyResult:
      type: object
      properties:
        warning:
          type: boolean
        message:
          type: string
      required:
        - warning

    Prediction:
      type: object
      properties:
        predicted30min:
          type: number
      required:
        - predicted30min

    GlucoseReadingResponse:
      type: object
      properties:
        current:
          type: number
        anomaly:
          $ref: "#/components/schemas/AnomalyResult"
        prediction:
          $ref: "#/components/schemas/Prediction"
        timestamp:
          type: string
      required:
        - current
        - anomaly
        - timestamp

    GlucoseHistoryEntry:
      type: object
      properties:
        glucose:
          type: number
        timestamp:
          type: string
        anomaly:
          $ref: "#/components/schemas/AnomalyResult"
      required:
        - glucose
        - timestamp
        - anomaly

    GlucoseHistoryResponse:
      type: object
      properties:
        history:
          type: array
          items:
            $ref: "#/components/schemas/GlucoseHistoryEntry"
        count:
          type: number
      required:
        - history
        - count

    InsulinRequest:
      type: object
      properties:
        carbs:
          type: number
          description: Carbohydrates in grams
        ratio:
          type: number
          description: Carb-to-insulin ratio (grams per unit)
        currentGlucose:
          type: number
          description: Current glucose for correction dose
        targetGlucose:
          type: number
          description: Target glucose level
        correctionFactor:
          type: number
          description: Insulin sensitivity factor
      required:
        - carbs
        - ratio

    InsulinResponse:
      type: object
      properties:
        insulin:
          type: number
          description: Calculated insulin dose in units
        mealDose:
          type: number
          description: Meal dose component
        correctionDose:
          type: number
          description: Correction dose component
      required:
        - insulin
        - mealDose
        - correctionDose

    FoodEstimateRequest:
      type: object
      properties:
        foodName:
          type: string
      required:
        - foodName

    FoodEstimateResponse:
      type: object
      properties:
        foodName:
          type: string
        estimatedCarbs:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        tips:
          type: string
      required:
        - foodName
        - estimatedCarbs
        - confidence

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DoctorLoginRequest:
      type: object
      properties:
        accessCode:
          type: string
      required:
        - accessCode

    DoctorLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        accessCode:
          type: string
        patientName:
          type: string
        hasData:
          type: boolean
      required:
        - success
        - accessCode
        - hasData

    DoctorMessage:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        text:
          type: string
        sender:
          type: string
          enum: [doctor, guardian]
        read:
          type: boolean
      required:
        - id
        - timestamp
        - text
        - sender
        - read

    DoctorMessagesResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DoctorMessage"
      required:
        - messages

    SendMessageRequest:
      type: object
      properties:
        text:
          type: string
        sender:
          type: string
          enum: [doctor, guardian]
      required:
        - text
        - sender

    InsulinLogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        units:
          type: number
        type:
          type: string
          enum: [bolus, correction, manual]
        note:
          type: string
        foodLogId:
          type: string
      required:
        - id
        - timestamp
        - units
        - type

    FoodLogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
        foodName:
          type: string
        estimatedCarbs:
          type: number
        insulinUnits:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
        fromPhoto:
          type: boolean
      required:
        - id
        - timestamp
        - foodName
        - estimatedCarbs
        - insulinUnits
        - confidence
        - fromPhoto

    CGMReading:
      type: object
      properties:
        value:
          type: number
        trend:
          type: string
        timestamp:
          type: string
      required:
        - value
        - trend
        - timestamp

    PatientProfile:
      type: object
      properties:
        childName:
          type: string
        parentName:
          type: string
        diabetesType:
          type: string
        dateOfBirth:
          type: string
        weightLbs:
          type: number
        doctorName:
          type: string
        insulinTypes:
          type: array
          items:
            type: string
        carbRatio:
          type: number
        targetGlucose:
          type: number
        correctionFactor:
          type: number
      required:
        - childName
        - diabetesType
        - dateOfBirth

    PatientSnapshot:
      type: object
      properties:
        accessCode:
          type: string
        profile:
          $ref: "#/components/schemas/PatientProfile"
        glucoseReadings:
          type: array
          items:
            $ref: "#/components/schemas/CGMReading"
        insulinLog:
          type: array
          items:
            $ref: "#/components/schemas/InsulinLogEntry"
        foodLog:
          type: array
          items:
            $ref: "#/components/schemas/FoodLogEntry"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/DoctorMessage"
        alertPreferences:
          type: object
          properties:
            lowThreshold:
              type: number
            highThreshold:
              type: number
            urgentLowThreshold:
              type: number
            urgentHighThreshold:
              type: number
        syncedAt:
          type: string
      required:
        - accessCode
        - profile
        - glucoseReadings
        - insulinLog
        - foodLog
        - messages
        - syncedAt
